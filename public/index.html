<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Báo Giá — Elide Fire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f5f7; color: #222; }

    .header {
      background: #f0f0f0;
      color: #c0392b;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
    }
    .header h1 { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; }
    .header span { font-size: 16px; color: #555; }

    .container { max-width: 860px; margin: 32px auto; padding: 0 16px 48px; }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 700;
      color: #c0392b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }

    .row { display: flex; gap: 16px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #222;
      transition: border-color 0.2s;
      background: white;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
    }
    .field input[readonly] {
      background: #f9f9f9;
      color: #888;
    }

    .product-table { width: 100%; border-collapse: collapse; }
    .product-table th {
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #eee;
    }
    .product-table td { padding: 10px 12px; vertical-align: middle; }
    .product-table tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
    .product-table input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      text-align: right;
    }
    .product-table input:focus { outline: none; border-color: #c0392b; }
    .product-table .product-name { font-size: 13px; font-weight: 700; color: #333; white-space: nowrap; }
    .product-table .total-display {
      font-size: 20px;
      font-weight: 700;
      color: #222;
      text-align: right;
      white-space: nowrap;
    }

    .subtotal-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .subtotal-row label { font-size: 13px; color: #777; }
    .subtotal-row span { font-size: 16px; font-weight: 600; color: #444; min-width: 140px; text-align: right; }

    .discount-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }
    .discount-row label { font-size: 13px; font-weight: 600; color: #555; }
    .discount-row .input-wrap { position: relative; width: 120px; }
    .discount-row .input-wrap input {
      width: 100%;
      padding: 8px 32px 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      text-align: right;
    }
    .discount-row .input-wrap input:focus { outline: none; border-color: #c0392b; }
    .discount-row .suffix {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #aaa;
      pointer-events: none;
    }

    .grand-total {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #eee;
    }
    .grand-total label { font-size: 14px; font-weight: 700; color: #555; }
    .grand-total span { font-size: 22px; font-weight: 800; color: #c0392b; }

    .btn-row { display: flex; gap: 12px; }
    .btn-submit {
      flex: 1;
      padding: 15px;
      background: #c0392b;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }
    .btn-submit:hover { background: #a93226; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .btn-reset {
      padding: 15px 24px;
      background: white;
      color: #888;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: #c0392b; color: #c0392b; }

    .status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status.loading { background: #eaf4fb; color: #2980b9; display: flex; }
    .status.success { background: #eafaf1; color: #1e8449; display: flex; }
    .status.error   { background: #fdedec; color: #c0392b; display: flex; }
    .status .status-text { flex: 1; }
    .status .btn-action {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .status .btn-action:hover { opacity: 0.85; }
    .btn-copy { background: #1e8449; color: white; }
    .btn-download { background: #2980b9; color: white; }

    /* Responsive mobile */
    @media (max-width: 600px) {
      /* Ngăn iOS Safari tự zoom khi focus vào input */
      input, select, textarea { font-size: 16px !important; }

      .header { padding: 20px 16px; }
      .header h1 { font-size: 22px; }
      .header span { font-size: 13px; }
      .header img { height: 44px; }

      .container { margin: 16px auto; padding: 0 10px 32px; }

      .card { padding: 18px 14px; }

      .row { flex-direction: column; gap: 0; }

      /* Bảng sản phẩm: ẩn header, hiển thị dạng card */
      .product-table thead { display: none; }
      .product-table, .product-table tbody, .product-table tr, .product-table td {
        display: block;
        width: 100%;
      }
      .product-table tr {
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 10px;
        background: #fafafa;
      }
      .product-table td {
        padding: 6px 4px;
        border: none !important;
      }
      .product-table td::before {
        content: attr(data-label);
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .product-table .total-display {
        font-size: 18px;
        text-align: left;
      }
      .subtotal-row, .discount-row, .grand-total { flex-direction: column; align-items: flex-end; gap: 6px; }
      .grand-total span { font-size: 20px; }
      .btn-row { flex-direction: column; }
    }

    /* Suffix đơn vị trong input */
    .input-wrap { position: relative; }
    .input-wrap .suffix {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #aaa;
      pointer-events: none;
    }
    .input-wrap input { padding-right: 32px; }
  </style>
</head>
<body>

<div class="header">
  <img src="/assets/logo/Logo-Elide%20Fire.png" alt="Elide Fire" style="height: 60px; margin-bottom: 10px;">
  <div>
    <h1>Tạo Báo Giá — Elide Fire Vietnam</h1>
    <span>Công ty Cổ phần Kỹ thuật Môi trường Tinh Tuệ</span>
  </div>
</div>

<div class="container">
  <form id="quoteForm">

    <!-- Thông tin nhân viên -->
    <div class="card">
      <h2>Nhân viên phụ trách</h2>
      <div class="row">
        <div class="field">
          <label>Chọn nhân viên *</label>
          <select id="nv_select" required>
            <option value="">-- Đang tải... --</option>
          </select>
          <input type="hidden" name="nv_ten" id="nv_ten">
          <input type="hidden" name="nv_bo_phan" id="nv_bo_phan">
          <input type="hidden" name="nv_email" id="nv_email">
          <input type="hidden" name="nv_sdt" id="nv_sdt">
        </div>
        <div class="field">
          <label>Bộ phận</label>
          <input type="text" id="nv_bo_phan_display" readonly placeholder="Tự động điền">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Email</label>
          <input type="text" id="nv_email_display" readonly placeholder="Tự động điền">
        </div>
        <div class="field">
          <label>Số điện thoại</label>
          <input type="text" id="nv_sdt_display" readonly placeholder="Tự động điền">
        </div>
      </div>
    </div>

    <!-- Thông tin báo giá -->
    <div class="card">
      <h2>Thông tin báo giá</h2>
      <div class="row">
        <div class="field">
          <label>Số báo giá *</label>
          <input type="text" name="so_bao_gia" id="so_bao_gia" placeholder="EF-2026-001" required>
        </div>
        <div class="field">
          <label>Ngày báo giá *</label>
          <input type="text" name="ngay_bao_gia" id="ngay_bao_gia" required>
        </div>
        <div class="field">
          <label>Phiên bản *</label>
          <select name="phien_ban" required>
            <option value="Phát hành lần đầu">Phát hành lần đầu</option>
            <option value="Phát hành lần thứ hai">Phát hành lần thứ hai</option>
            <option value="Phát hành lần thứ ba">Phát hành lần thứ ba</option>
            <option value="Phát hành lần thứ tư">Phát hành lần thứ tư</option>
            <option value="Phát hành lần thứ năm">Phát hành lần thứ năm</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Tên dự án *</label>
        <input type="text" name="ten_du_an" placeholder="Lắp đặt PCCC Kho Hàng ABC" required>
      </div>
    </div>

    <!-- Thông tin khách hàng -->
    <div class="card">
      <h2>Thông tin khách hàng</h2>
      <div class="row">
        <div class="field">
          <label>Tên công ty *</label>
          <input type="text" name="ten_cong_ty" placeholder="Công ty TNHH ABC" required>
        </div>
        <div class="field">
          <label>Phòng ban *</label>
          <input type="text" name="ten_phong_ban" placeholder="Phòng Kỹ Thuật" required>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Người liên hệ *</label>
          <input type="text" name="ten_nguoi_lien_he" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="field">
          <label>Số điện thoại *</label>
          <input type="text" name="sdt_khach_hang" placeholder="0901 234 567" required>
        </div>
        <div class="field">
          <label>Email *</label>
          <input type="email" name="email_khach_hang" placeholder="email@congty.vn" required>
        </div>
      </div>
    </div>

    <!-- Sản phẩm -->
    <div class="card">
      <h2>Sản phẩm</h2>
      <table class="product-table">
        <thead>
          <tr>
            <th style="width:22%; white-space:nowrap">Sản phẩm</th>
            <th style="width:13%; white-space:nowrap">Số lượng</th>
            <th style="width:22%; white-space:nowrap">Đơn giá (VNĐ)</th>
            <th style="width:16%; white-space:nowrap">Giảm giá (%)</th>
            <th style="width:27%; white-space:nowrap; text-align:right">Thành tiền (VNĐ)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="product-name" data-label="Sản phẩm">Techideas 1.4kg</td>
            <td data-label="Số lượng">
              <input type="number" name="so_luong_01" id="qty1" min="0" value="1" oninput="calcTotal()">
            </td>
            <td data-label="Đơn giá (VNĐ)">
              <input type="text" name="gia_sp_01" id="price1" value="2,500,000" oninput="calcTotal()">
            </td>
            <td data-label="Giảm giá (%)">
              <div class="input-wrap">
                <input type="number" name="chiet_khau_01" id="ck1" min="0" max="100" value="0" oninput="calcTotal()">
                <span class="suffix">%</span>
              </div>
            </td>
            <td class="total-display" id="tt1" data-label="Thành tiền (VNĐ)">2,500,000</td>
          </tr>
          <tr>
            <td class="product-name" data-label="Sản phẩm">Lovingcare 0.4kg</td>
            <td data-label="Số lượng">
              <input type="number" name="so_luong_02" id="qty2" min="0" value="0" oninput="calcTotal()">
            </td>
            <td data-label="Đơn giá (VNĐ)">
              <input type="text" name="gia_sp_02" id="price2" value="1,950,000" oninput="calcTotal()">
            </td>
            <td data-label="Giảm giá (%)">
              <div class="input-wrap">
                <input type="number" name="chiet_khau_02" id="ck2" min="0" max="100" value="0" oninput="calcTotal()">
                <span class="suffix">%</span>
              </div>
            </td>
            <td class="total-display" id="tt2" data-label="Thành tiền (VNĐ)">0</td>
          </tr>
        </tbody>
      </table>

      <!-- Tổng trước chiết khấu -->
      <div class="subtotal-row">
        <label>Tổng trước chiết khấu:</label>
        <span id="subtotal_display">2,500,000 VNĐ</span>
      </div>

      <!-- Chiết khấu tổng đơn -->
      <div class="discount-row">
        <label>Chiết khấu tổng đơn:</label>
        <div class="input-wrap">
          <input type="number" name="chiet_khau_tong" id="ck_tong" min="0" max="100" value="0" oninput="calcTotal()">
          <span class="suffix">%</span>
        </div>
      </div>

      <!-- Tổng thanh toán -->
      <div class="grand-total">
        <label>TỔNG THANH TOÁN:</label>
        <span id="grand_total">2,500,000 VNĐ</span>
      </div>
    </div>

    <!-- Submit + Reset -->
    <div class="card">
      <div class="btn-row">
        <button type="button" class="btn-reset" onclick="resetForm()">
          ↺ Nhập lại
        </button>
        <button type="submit" class="btn-submit" id="submitBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:8px; margin-bottom:2px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Xuất PDF Báo Giá
        </button>
      </div>
      <div class="status" id="status">
        <span class="status-text" id="statusText"></span>
      </div>
    </div>

  </form>
</div>

<script>
  // ---- Khởi tạo ----
  const today = new Date();
  document.getElementById('ngay_bao_gia').value =
    today.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });

  const month = String(today.getMonth() + 1).padStart(2, '0');
  const year  = today.getFullYear();
  document.getElementById('so_bao_gia').value = `EF-${year}-${month}-001`;

  // ---- Load danh sách nhân viên ----
  let employeeList = [];
  async function loadEmployees() {
    try {
      const res = await fetch('/api/employees');
      employeeList = await res.json();
      const sel = document.getElementById('nv_select');
      sel.innerHTML = '<option value="">-- Chọn nhân viên --</option>';
      employeeList.forEach(nv => {
        if (!nv.Ten_nhan_vien) return;
        const opt = document.createElement('option');
        opt.value = nv.Id;
        opt.textContent = `${nv.Ten_nhan_vien} — ${nv.Bo_phan || ''}`;
        sel.appendChild(opt);
      });
    } catch (e) {
      document.getElementById('nv_select').innerHTML = '<option value="">-- Không tải được --</option>';
    }
  }
  loadEmployees();

  // ---- Chọn nhân viên → tự điền thông tin ----
  document.getElementById('nv_select').addEventListener('change', function() {
    const id = parseInt(this.value);
    const nv = employeeList.find(e => e.Id === id);
    if (nv) {
      document.getElementById('nv_ten').value          = nv.Ten_nhan_vien || '';
      document.getElementById('nv_bo_phan').value      = nv.Bo_phan       || '';
      document.getElementById('nv_email').value        = nv.Email         || '';
      document.getElementById('nv_sdt').value          = nv.So_dien_thoai || '';
      document.getElementById('nv_bo_phan_display').value = nv.Bo_phan       || '';
      document.getElementById('nv_email_display').value   = nv.Email         || '';
      document.getElementById('nv_sdt_display').value     = nv.So_dien_thoai || '';
    } else {
      ['nv_ten','nv_bo_phan','nv_email','nv_sdt'].forEach(id => document.getElementById(id).value = '');
      ['nv_bo_phan_display','nv_email_display','nv_sdt_display'].forEach(id => document.getElementById(id).value = '');
    }
  });

  // ---- Tính toán ----
  function parseNum(str) {
    return parseFloat((str || '').replace(/[^0-9.]/g, '')) || 0;
  }

  function fmtVND(n) {
    if (n === 0) return '0';
    return n.toLocaleString('vi-VN');
  }

  function calcTotal() {
    const qty1  = parseFloat(document.getElementById('qty1').value)   || 0;
    const qty2  = parseFloat(document.getElementById('qty2').value)   || 0;
    const p1    = parseNum(document.getElementById('price1').value);
    const p2    = parseNum(document.getElementById('price2').value);
    const ck1   = parseFloat(document.getElementById('ck1').value)    || 0;
    const ck2   = parseFloat(document.getElementById('ck2').value)    || 0;
    const ckTong = parseFloat(document.getElementById('ck_tong').value) || 0;

    const tt1      = qty1 * p1 * (1 - ck1 / 100);
    const tt2      = qty2 * p2 * (1 - ck2 / 100);
    const subtotal = tt1 + tt2;
    const total    = subtotal * (1 - ckTong / 100);

    document.getElementById('tt1').textContent          = fmtVND(tt1);
    document.getElementById('tt2').textContent          = fmtVND(tt2);
    document.getElementById('subtotal_display').textContent = fmtVND(subtotal) + ' VNĐ';
    document.getElementById('grand_total').textContent  = fmtVND(total) + ' VNĐ';
  }

  calcTotal();

  // ---- Reset form ----
  function resetForm() {
    if (!confirm('Xóa hết thông tin đã nhập?')) return;
    document.getElementById('quoteForm').reset();
    // Khôi phục giá trị mặc định
    const t = new Date();
    document.getElementById('ngay_bao_gia').value =
      t.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const m = String(t.getMonth() + 1).padStart(2, '0');
    document.getElementById('so_bao_gia').value = `EF-${t.getFullYear()}-${m}-001`;
    // Xóa thông tin nhân viên
    ['nv_ten','nv_bo_phan','nv_email','nv_sdt'].forEach(id => document.getElementById(id).value = '');
    ['nv_bo_phan_display','nv_email_display','nv_sdt_display'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('nv_select').value = '';
    document.getElementById('status').className = 'status';
    calcTotal();
  }

  // ---- Poll job status ----
  async function pollJob(jobId, onProgress) {
    const maxWait = 180000; // 3 phút tối đa
    const interval = 3000;
    const start = Date.now();
    let dots = 0;
    while (Date.now() - start < maxWait) {
      await new Promise(r => setTimeout(r, interval));
      dots = (dots % 3) + 1;
      onProgress('⏳ Đang tạo PDF' + '.'.repeat(dots));
      const r = await fetch('/api/job/' + jobId);
      const job = await r.json();
      if (job.status === 'done') return { url: job.url, filename: job.filename };
      if (job.status === 'error') throw new Error(job.error || 'Lỗi không xác định');
    }
    throw new Error('Quá thời gian chờ, vui lòng thử lại');
  }

  // ---- Submit xuất PDF ----
  document.getElementById('quoteForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    // Kiểm tra nhân viên đã chọn
    if (!document.getElementById('nv_ten').value) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = '❌ Vui lòng chọn nhân viên phụ trách.';
      return;
    }

    const btn    = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    btn.textContent = 'Đang tạo PDF...';
    status.className = 'status loading';
    status.querySelectorAll('.btn-action').forEach(b => b.remove());
    document.getElementById('statusText').textContent = '⏳ Đang khởi tạo...';

    try {
      const formData = new FormData(e.target);
      const body     = new URLSearchParams(formData);
      const r1       = await fetch('/api/generate', { method: 'POST', body });
      if (!r1.ok) throw new Error(await r1.text());
      const { jobId } = await r1.json();

      // Poll cho đến khi xong
      const { url, filename } = await pollJob(jobId, (msg) => {
        document.getElementById('statusText').textContent = msg;
      });

      // Hiển thị 2 nút
      status.className = 'status success';
      document.getElementById('statusText').textContent = '✅ ' + filename;
      status.querySelectorAll('.btn-action').forEach(b => b.remove());

      const btnCopy = document.createElement('button');
      btnCopy.type = 'button';
      btnCopy.className = 'btn-action btn-copy';
      btnCopy.textContent = '📋 Copy link';
      btnCopy.onclick = () => {
        navigator.clipboard.writeText(url).then(() => {
          btnCopy.textContent = '✓ Đã copy!';
          setTimeout(() => btnCopy.textContent = '📋 Copy link', 2000);
        });
      };

      const btnDl = document.createElement('button');
      btnDl.type = 'button';
      btnDl.className = 'btn-action btn-download';
      btnDl.textContent = '⬇ Download';
      btnDl.onclick = () => { const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); };

      status.appendChild(btnCopy);
      status.appendChild(btnDl);

    } catch (err) {
      status.className = 'status error';
      document.getElementById('statusText').textContent = '❌ Lỗi: ' + err.message;
      status.querySelectorAll('.btn-action').forEach(b => b.remove());
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:8px; margin-bottom:2px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Xuất PDF Báo Giá';
    }
  });
</script>
</body>
</html>
