<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo Báo Giá — Elide Fire</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f5f7; color: #222; }

    .header {
      background: #f0f0f0;
      color: #c0392b;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 6px;
    }
    .header h1 { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; }
    .header span { font-size: 16px; color: #555; }

    .container { max-width: 860px; margin: 32px auto; padding: 0 16px 48px; }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 700;
      color: #c0392b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }

    .row { display: flex; gap: 16px; }
    .row .field { flex: 1; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #222;
      transition: border-color 0.2s;
      background: white;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #c0392b;
      box-shadow: 0 0 0 3px rgba(192,57,43,0.08);
    }
    .field input[readonly] {
      background: #f9f9f9;
      color: #888;
    }

    /* Bảng sản phẩm */
    .product-table { width: 100%; border-collapse: collapse; }
    .product-table th {
      background: #fafafa;
      font-size: 12px;
      font-weight: 700;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 2px solid #eee;
    }
    .product-table td { padding: 8px 10px; vertical-align: middle; }
    .product-table tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
    .product-table select,
    .product-table input[type="number"],
    .product-table input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      background: white;
    }
    .product-table select:focus,
    .product-table input:focus { outline: none; border-color: #c0392b; }
    .product-table input[readonly] { background: #f9f9f9; color: #666; }
    .product-table .col-total {
      font-size: 15px;
      font-weight: 700;
      color: #222;
      text-align: right;
      white-space: nowrap;
    }
    .btn-remove-row {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .btn-remove-row:hover { color: #c0392b; background: #fff0ee; }

    .btn-add-row {
      margin-top: 14px;
      padding: 8px 18px;
      background: white;
      border: 1.5px dashed #c0392b;
      border-radius: 6px;
      color: #c0392b;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add-row:hover { background: #fff0ee; }

    /* Input với suffix % */
    .input-wrap { position: relative; }
    .input-wrap .suffix {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #aaa;
      pointer-events: none;
    }
    .input-wrap input { padding-right: 28px; }

    .subtotal-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .subtotal-row label { font-size: 13px; color: #777; }
    .subtotal-row span { font-size: 16px; font-weight: 600; color: #444; min-width: 140px; text-align: right; }

    .discount-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }
    .discount-row label { font-size: 13px; font-weight: 600; color: #555; }
    .discount-row .input-wrap { width: 120px; }
    .discount-row .input-wrap input {
      width: 100%;
      padding: 8px 32px 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      text-align: right;
    }
    .discount-row .input-wrap input:focus { outline: none; border-color: #c0392b; }

    .grand-total {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 2px solid #eee;
    }
    .grand-total label { font-size: 14px; font-weight: 700; color: #555; }
    .grand-total span { font-size: 22px; font-weight: 800; color: #c0392b; }

    /* Buttons */
    .btn-row { display: flex; gap: 12px; }
    .btn-base {
      flex: 1;
      min-width: 0;
      padding: 14px 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .btn-submit {
      background: #c0392b;
      color: white;
      border: 1.5px solid #c0392b;
    }
    .btn-submit:hover { background: #a93226; border-color: #a93226; }
    .btn-submit:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }
    .btn-reset {
      background: white;
      color: #888;
      border: 1.5px solid #ddd;
    }
    .btn-reset:hover { border-color: #c0392b; color: #c0392b; }
    .btn-copy {
      background: white;
      color: #c0392b;
      border: 1.5px solid #c0392b;
    }
    .btn-copy:hover { background: #c0392b; color: white; }

    /* Status bar */
    .status {
      margin-top: 16px;
      font-size: 13px;
      display: none;
    }
    .status.loading { display: block; color: #888; padding: 10px 0 4px; }
    .status.error   { display: block; color: #c0392b; padding: 10px 0 4px; }
    .status.success { display: block; }
    .status .status-text { display: block; color: #555; padding: 10px 0 10px; word-break: break-all; }
    .status .btn-row-actions { display: flex; gap: 12px; }

    /* Responsive mobile */
    @media (max-width: 600px) {
      input, select, textarea { font-size: 16px !important; }

      .header { padding: 20px 16px; }
      .header h1 { font-size: 22px; }
      .header span { font-size: 13px; }
      .header img { height: 44px; }
      .container { margin: 16px auto; padding: 0 10px 32px; }
      .card { padding: 18px 14px; }
      .row { flex-direction: column; gap: 0; }

      /* Bảng sản phẩm mobile: card style */
      .product-table thead { display: none; }
      .product-table, .product-table tbody, .product-table tr, .product-table td {
        display: block; width: 100%;
      }
      .product-table tr {
        border: 1px solid #eee;
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 10px;
        background: #fafafa;
        position: relative;
      }
      .product-table td { padding: 6px 4px; border: none !important; }
      .product-table td::before {
        content: attr(data-label);
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }
      .product-table td.col-remove { position: absolute; top: 8px; right: 8px; }
      .product-table td.col-remove::before { display: none; }
      .product-table .col-total { text-align: left; font-size: 15px; }
      .subtotal-row, .discount-row, .grand-total { flex-direction: column; align-items: flex-end; gap: 6px; }
      .grand-total span { font-size: 20px; }
      .btn-row { flex-direction: column; }
      .btn-base { padding: 13px 12px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="header">
  <img src="/assets/logo/Logo-Elide%20Fire.png" alt="Elide Fire" style="height: 60px; margin-bottom: 10px;">
  <div>
    <h1>Tạo Báo Giá — Elide Fire Vietnam</h1>
    <span>Công ty Cổ phần Kỹ thuật Môi trường Tinh Tuệ</span>
  </div>
</div>

<div class="container">
  <form id="quoteForm">

    <!-- Thông tin nhân viên -->
    <div class="card">
      <h2>Nhân viên phụ trách</h2>
      <div class="row">
        <div class="field">
          <label>Chọn nhân viên *</label>
          <select id="nv_select" required>
            <option value="">-- Đang tải... --</option>
          </select>
          <input type="hidden" name="nv_ten" id="nv_ten">
          <input type="hidden" name="nv_bo_phan" id="nv_bo_phan">
          <input type="hidden" name="nv_email" id="nv_email">
          <input type="hidden" name="nv_sdt" id="nv_sdt">
        </div>
        <div class="field">
          <label>Bộ phận</label>
          <input type="text" id="nv_bo_phan_display" readonly placeholder="Tự động điền">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Email</label>
          <input type="text" id="nv_email_display" readonly placeholder="Tự động điền">
        </div>
        <div class="field">
          <label>Số điện thoại</label>
          <input type="text" id="nv_sdt_display" readonly placeholder="Tự động điền">
        </div>
      </div>
    </div>

    <!-- Thông tin báo giá -->
    <div class="card">
      <h2>Thông tin báo giá</h2>
      <div class="row">
        <div class="field">
          <label>Số báo giá *</label>
          <input type="text" name="so_bao_gia" id="so_bao_gia" placeholder="EF-2026-001" required>
        </div>
        <div class="field">
          <label>Ngày báo giá *</label>
          <input type="text" name="ngay_bao_gia" id="ngay_bao_gia" required>
        </div>
        <div class="field">
          <label>Phiên bản *</label>
          <select name="phien_ban" required>
            <option value="Phát hành lần đầu">Phát hành lần đầu</option>
            <option value="Phát hành lần thứ hai">Phát hành lần thứ hai</option>
            <option value="Phát hành lần thứ ba">Phát hành lần thứ ba</option>
            <option value="Phát hành lần thứ tư">Phát hành lần thứ tư</option>
            <option value="Phát hành lần thứ năm">Phát hành lần thứ năm</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Tên dự án *</label>
        <input type="text" name="ten_du_an" placeholder="Lắp đặt PCCC Kho Hàng ABC" required>
      </div>
    </div>

    <!-- Thông tin khách hàng -->
    <div class="card">
      <h2>Thông tin khách hàng</h2>
      <div class="row">
        <div class="field">
          <label>Tên công ty *</label>
          <input type="text" name="ten_cong_ty" placeholder="Công ty TNHH ABC" required>
        </div>
        <div class="field">
          <label>Phòng ban *</label>
          <input type="text" name="ten_phong_ban" placeholder="Phòng Kỹ Thuật" required>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Người liên hệ *</label>
          <input type="text" name="ten_nguoi_lien_he" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="field">
          <label>Số điện thoại *</label>
          <input type="text" name="sdt_khach_hang" placeholder="0901 234 567" required>
        </div>
        <div class="field">
          <label>Email *</label>
          <input type="email" name="email_khach_hang" placeholder="email@congty.vn" required>
        </div>
      </div>
    </div>

    <!-- Sản phẩm -->
    <div class="card">
      <h2>Sản phẩm</h2>
      <table class="product-table">
        <thead>
          <tr>
            <th style="width:30%">Model sản phẩm</th>
            <th style="width:11%">Số lượng</th>
            <th style="width:22%">Đơn giá (VNĐ)</th>
            <th style="width:14%">Giảm giá</th>
            <th style="width:19%; text-align:right">Thành tiền</th>
            <th style="width:4%"></th>
          </tr>
        </thead>
        <tbody id="productBody">
          <!-- Rows thêm bằng JS -->
        </tbody>
      </table>

      <button type="button" class="btn-add-row" onclick="addProductRow()">+ Thêm sản phẩm</button>

      <!-- Tổng trước chiết khấu -->
      <div class="subtotal-row">
        <label>Tổng trước chiết khấu:</label>
        <span id="subtotal_display">0 VNĐ</span>
      </div>

      <!-- Chiết khấu tổng đơn -->
      <div class="discount-row">
        <label>Chiết khấu tổng đơn:</label>
        <div class="input-wrap">
          <input type="number" name="chiet_khau_tong" id="ck_tong" min="0" max="100" value="0" oninput="calcTotal()">
          <span class="suffix">%</span>
        </div>
      </div>

      <!-- Tổng thanh toán -->
      <div class="grand-total">
        <label>TỔNG THANH TOÁN:</label>
        <span id="grand_total">0 VNĐ</span>
      </div>
    </div>

    <!-- Submit + Reset -->
    <div class="card">
      <div class="btn-row" id="mainBtnRow">
        <button type="button" class="btn-base btn-reset" onclick="resetForm()">↺ Nhập lại</button>
        <button type="submit" class="btn-base btn-submit" id="submitBtn">⬇ Xuất PDF Báo Giá</button>
      </div>
      <div class="status" id="status">
        <span class="status-text" id="statusText"></span>
        <div class="btn-row btn-row-actions" id="actionBtnRow" style="display:none"></div>
      </div>
    </div>

  </form>
</div>

<script>
  // ---- Khởi tạo ngày / số BG ----
  const today = new Date();
  document.getElementById('ngay_bao_gia').value =
    today.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const month = String(today.getMonth() + 1).padStart(2, '0');
  document.getElementById('so_bao_gia').value = `EF-${today.getFullYear()}-${month}-001`;

  // ---- Load nhân viên ----
  let employeeList = [];
  async function loadEmployees() {
    try {
      const res = await fetch('/api/employees');
      employeeList = await res.json();
      const sel = document.getElementById('nv_select');
      sel.innerHTML = '<option value="">-- Chọn nhân viên --</option>';
      employeeList.forEach(nv => {
        if (!nv.Ten_nhan_vien) return;
        const opt = document.createElement('option');
        opt.value = nv.Id;
        opt.textContent = `${nv.Ten_nhan_vien} — ${nv.Bo_phan || ''}`;
        sel.appendChild(opt);
      });
    } catch (e) {
      document.getElementById('nv_select').innerHTML = '<option value="">-- Không tải được --</option>';
    }
  }

  document.getElementById('nv_select').addEventListener('change', function() {
    const id = parseInt(this.value);
    const nv = employeeList.find(e => e.Id === id);
    if (nv) {
      document.getElementById('nv_ten').value             = nv.Ten_nhan_vien || '';
      document.getElementById('nv_bo_phan').value         = nv.Bo_phan       || '';
      document.getElementById('nv_email').value           = nv.Email         || '';
      document.getElementById('nv_sdt').value             = nv.So_dien_thoai || '';
      document.getElementById('nv_bo_phan_display').value = nv.Bo_phan       || '';
      document.getElementById('nv_email_display').value   = nv.Email         || '';
      document.getElementById('nv_sdt_display').value     = nv.So_dien_thoai || '';
    } else {
      ['nv_ten','nv_bo_phan','nv_email','nv_sdt'].forEach(id => document.getElementById(id).value = '');
      ['nv_bo_phan_display','nv_email_display','nv_sdt_display'].forEach(id => document.getElementById(id).value = '');
    }
  });

  // ---- Load sản phẩm ----
  let productList = [];
  async function loadProducts() {
    try {
      const res = await fetch('/api/products');
      productList = await res.json();
      // Thêm 2 dòng mặc định sau khi có dữ liệu sản phẩm
      addProductRow('TECHIDEAS');
      addProductRow('LOVINGCARE');
    } catch (e) {
      addProductRow();
    }
  }

  // ---- Thêm dòng sản phẩm ----
  function addProductRow(defaultModel) {
    const tbody = document.getElementById('productBody');
    const tr = document.createElement('tr');

    const modelOptions = productList.map(p =>
      `<option value="${p.Model}" data-price="${p.Don_gia || 0}" data-mota="${encodeURIComponent(p.Ten_hang_hoa || p.Model || '')}">${p.Model}</option>`
    ).join('');

    tr.innerHTML = `
      <td data-label="Model sản phẩm">
        <select class="row-model" onchange="onModelChange(this)">
          <option value="">-- Chọn --</option>
          ${modelOptions}
        </select>
      </td>
      <td data-label="Số lượng">
        <input type="number" class="row-qty" min="0" value="1" oninput="calcTotal()">
      </td>
      <td data-label="Đơn giá (VNĐ)">
        <input type="text" class="row-price" readonly placeholder="Tự động điền">
      </td>
      <td data-label="Giảm giá (%)">
        <div class="input-wrap">
          <input type="number" class="row-ck" min="0" max="100" value="0" oninput="calcTotal()">
          <span class="suffix">%</span>
        </div>
      </td>
      <td class="col-total" data-label="Thành tiền (VNĐ)">0</td>
      <td class="col-remove">
        <button type="button" class="btn-remove-row" onclick="removeRow(this)" title="Xóa dòng">×</button>
      </td>
    `;

    tbody.appendChild(tr);

    if (defaultModel) {
      const sel = tr.querySelector('.row-model');
      sel.value = defaultModel;
      onModelChange(sel);
    }
  }

  // ---- Chọn model → điền đơn giá ----
  function onModelChange(sel) {
    const opt = sel.options[sel.selectedIndex];
    const tr  = sel.closest('tr');
    const priceInput = tr.querySelector('.row-price');
    if (opt && opt.dataset.price) {
      const price = parseInt(opt.dataset.price) || 0;
      priceInput.value = price > 0 ? price.toLocaleString('vi-VN') : '';
    } else {
      priceInput.value = '';
    }
    calcTotal();
  }

  // ---- Xóa dòng ----
  function removeRow(btn) {
    const tbody = document.getElementById('productBody');
    if (tbody.children.length <= 1) {
      alert('Cần ít nhất 1 sản phẩm.');
      return;
    }
    btn.closest('tr').remove();
    calcTotal();
  }

  // ---- Tính toán ----
  function parseNum(str) {
    // Vietnamese format dùng dấu . làm phân cách nghìn (2.500.000) → bỏ hết dấu .
    return parseFloat((str || '').replace(/\./g, '').replace(/,/g, '.')) || 0;
  }
  function fmtVND(n) {
    return n > 0 ? n.toLocaleString('vi-VN') : '0';
  }

  function calcTotal() {
    let subtotal = 0;
    document.querySelectorAll('#productBody tr').forEach(tr => {
      const qty   = parseFloat(tr.querySelector('.row-qty').value) || 0;
      const price = parseNum(tr.querySelector('.row-price').value);
      const ck    = parseFloat(tr.querySelector('.row-ck').value) || 0;
      const tt    = qty * price * (1 - ck / 100);
      tr.querySelector('.col-total').textContent = fmtVND(tt);
      subtotal += tt;
    });
    const ckTong = parseFloat(document.getElementById('ck_tong').value) || 0;
    const total  = subtotal * (1 - ckTong / 100);
    document.getElementById('subtotal_display').textContent = fmtVND(subtotal) + ' VNĐ';
    document.getElementById('grand_total').textContent      = fmtVND(total)    + ' VNĐ';
  }

  // ---- Reset form ----
  function resetForm() {
    if (!confirm('Xóa hết thông tin đã nhập?')) return;
    document.getElementById('quoteForm').reset();
    const t = new Date();
    document.getElementById('ngay_bao_gia').value =
      t.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const m = String(t.getMonth() + 1).padStart(2, '0');
    document.getElementById('so_bao_gia').value = `EF-${t.getFullYear()}-${m}-001`;
    ['nv_ten','nv_bo_phan','nv_email','nv_sdt'].forEach(id => document.getElementById(id).value = '');
    ['nv_bo_phan_display','nv_email_display','nv_sdt_display'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('nv_select').value = '';
    document.getElementById('status').className = 'status';
    document.getElementById('actionBtnRow').style.display = 'none';
    // Reset product rows về mặc định
    document.getElementById('productBody').innerHTML = '';
    addProductRow('TECHIDEAS');
    addProductRow('LOVINGCARE');
    calcTotal();
  }

  // ---- Poll job status ----
  async function pollJob(jobId, onProgress) {
    const maxWait = 180000;
    const interval = 3000;
    const start = Date.now();
    let dots = 0;
    while (Date.now() - start < maxWait) {
      await new Promise(r => setTimeout(r, interval));
      dots = (dots % 3) + 1;
      onProgress('⏳ Đang tạo PDF' + '.'.repeat(dots));
      const r = await fetch('/api/job/' + jobId);
      const job = await r.json();
      if (job.status === 'done') return { url: job.url, filename: job.filename };
      if (job.status === 'error') throw new Error(job.error || 'Lỗi không xác định');
    }
    throw new Error('Quá thời gian chờ, vui lòng thử lại');
  }

  // ---- Submit xuất PDF ----
  document.getElementById('quoteForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    if (!document.getElementById('nv_ten').value) {
      document.getElementById('status').className = 'status error';
      document.getElementById('statusText').textContent = '❌ Vui lòng chọn nhân viên phụ trách.';
      document.getElementById('status').style.display = 'block';
      return;
    }

    // Build items array từ các dòng sản phẩm
    const items = [];
    document.querySelectorAll('#productBody tr').forEach(tr => {
      const sel    = tr.querySelector('.row-model');
      const model  = sel.value;
      if (!model) return;
      const opt    = sel.options[sel.selectedIndex];
      const mo_ta  = decodeURIComponent(opt.dataset.mota || model);
      const so_luong   = parseFloat(tr.querySelector('.row-qty').value) || 0;
      const don_gia    = parseNum(tr.querySelector('.row-price').value);
      const chiet_khau = parseFloat(tr.querySelector('.row-ck').value) || 0;
      const thanh_tien = so_luong * don_gia * (1 - chiet_khau / 100);
      if (so_luong > 0) {
        items.push({ model, mo_ta, so_luong, don_gia, chiet_khau, thanh_tien });
      }
    });

    if (items.length === 0) {
      document.getElementById('status').className = 'status error';
      document.getElementById('statusText').textContent = '❌ Vui lòng thêm ít nhất 1 sản phẩm với số lượng > 0.';
      document.getElementById('status').style.display = 'block';
      return;
    }

    const btn    = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    btn.textContent = 'Đang tạo PDF...';
    status.className = 'status loading';
    status.style.display = 'block';
    document.getElementById('actionBtnRow').style.display = 'none';
    document.getElementById('statusText').textContent = '⏳ Đang khởi tạo...';

    try {
      // Gom tất cả form data + items
      const formData = new FormData(e.target);
      const payload = {};
      formData.forEach((v, k) => { payload[k] = v; });
      payload.items = items;
      payload.chiet_khau_tong = document.getElementById('ck_tong').value || '0';

      const r1 = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!r1.ok) throw new Error(await r1.text());
      const { jobId } = await r1.json();

      const { url, filename } = await pollJob(jobId, (msg) => {
        document.getElementById('statusText').textContent = msg;
      });

      status.className = 'status success';
      document.getElementById('statusText').textContent = '✅ ' + filename;

      const actionRow = document.getElementById('actionBtnRow');
      actionRow.innerHTML = '';
      actionRow.style.display = 'flex';

      const btnCopy = document.createElement('button');
      btnCopy.type = 'button';
      btnCopy.className = 'btn-base btn-reset btn-copy';
      btnCopy.textContent = '📋 Copy link';
      btnCopy.onclick = () => {
        navigator.clipboard.writeText(url).then(() => {
          btnCopy.textContent = '✓ Đã copy!';
          setTimeout(() => { btnCopy.textContent = '📋 Copy link'; }, 2000);
        });
      };

      const btnDl = document.createElement('button');
      btnDl.type = 'button';
      btnDl.className = 'btn-base btn-submit';
      btnDl.textContent = '⬇ Download';
      btnDl.onclick = () => { const a = document.createElement('a'); a.href = url; a.download = filename; a.click(); };

      actionRow.appendChild(btnCopy);
      actionRow.appendChild(btnDl);

    } catch (err) {
      status.className = 'status error';
      document.getElementById('statusText').textContent = '❌ Lỗi: ' + err.message;
      document.getElementById('actionBtnRow').style.display = 'none';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle; margin-right:8px; margin-bottom:2px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Xuất PDF Báo Giá';
    }
  });

  // ---- Khởi động ----
  loadEmployees();
  loadProducts();
</script>
</body>
</html>
